<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pebble UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;background:#0d1117;color:#c9d1d9;line-height:1.5}
.app{max-width:1600px;margin:0 auto;padding:16px 24px}

/* Header */
.app-header{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #21262d;margin-bottom:16px}
.app-header h1{font-size:18px;color:#58a6ff;font-weight:700}
.subtitle{font-size:13px;color:#484f58}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.kbd-hint{font-size:11px;color:#484f58}
kbd{background:#161b22;border:1px solid #30363d;border-radius:3px;padding:1px 5px;font-size:10px;color:#8b949e;font-family:inherit}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1f6feb;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:12px;position:relative}
.search-bar input{flex:1;background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px 36px 8px 12px;font-size:14px;font-family:'SF Mono','Fira Code',monospace;outline:none}
.search-bar input:focus{border-color:#58a6ff;box-shadow:0 0 0 2px rgba(88,166,255,.15)}
.search-clear{position:absolute;right:100px;top:50%;transform:translateY(-50%);background:none;border:none;color:#484f58;cursor:pointer;font-size:16px;padding:4px 8px;display:none}
.search-clear:hover{color:#c9d1d9}
.search-bar button[type=submit]{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}
.search-bar button[type=submit]:hover{background:#2ea043}

/* Filter chips */
.key-type-filter{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-label{font-size:11px;color:#484f58;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{background:#161b22;color:#8b949e;border:1px solid #21262d;border-radius:16px;padding:3px 10px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.chip:hover{background:#1f2937;color:#58a6ff;border-color:#30363d}
.chip-active{background:#1f3a5f;color:#58a6ff;border-color:#58a6ff}
.chip-wrapper{position:relative}
.chip-tooltip{position:absolute;top:calc(100% + 6px);left:0;z-index:10;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:10px 12px;min-width:300px;max-width:480px;box-shadow:0 4px 12px rgba(0,0,0,.5);pointer-events:none}
.chip-desc{font-size:12px;color:#c9d1d9;margin-bottom:6px;line-height:1.4}
.chip-example{display:block;font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:#7ee787;background:#0d1117;padding:4px 8px;border-radius:4px;word-break:break-all}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:12px;padding:6px 0;margin-bottom:8px;font-size:12px;color:#484f58;border-bottom:1px solid #161b22}
.status-count{color:#8b949e;font-weight:600}
.status-prefix{color:#58a6ff;font-family:'SF Mono','Fira Code',monospace}

/* Key list table */
.key-list table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.key-list thead th{text-align:left;padding:6px 10px;border-bottom:2px solid #21262d;color:#484f58;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:#0d1117;z-index:2}
.th-num{width:40px}.th-key{width:55%}.th-size{width:70px}.th-preview{}.th-actions{width:36px}
.key-row{cursor:pointer;transition:background .08s}
.key-row:hover{background:#161b22}
.key-row:nth-child(even){background:#0b0f14}
.key-row:nth-child(even):hover{background:#161b22}
.key-row td{padding:5px 10px;border-bottom:1px solid #161b22;vertical-align:middle}
.key-row.selected{background:#1a2332;outline:1px solid #1f6feb}
.row-num{color:#30363d;font-size:11px;text-align:right;padding-right:12px;user-select:none}
.key-cell{font-family:'SF Mono','Fira Code',monospace;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.key-prefix{color:#484f58}
.key-suffix{color:#58a6ff;font-weight:500}
.size-cell{white-space:nowrap;color:#484f58;font-size:12px;font-family:'SF Mono','Fira Code',monospace}
.preview-cell{color:#6e7681;font-family:'SF Mono','Fira Code',monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:none;border:none;color:#30363d;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .1s}
.copy-btn:hover{color:#58a6ff;background:#161b22}
.load-more{display:block;margin:16px auto;background:#161b22;color:#8b949e;border:1px solid #21262d;border-radius:6px;padding:8px 32px;font-size:13px;cursor:pointer;font-weight:500}
.load-more:hover{background:#1f2937;color:#c9d1d9;border-color:#30363d}

/* Detail view */
.detail-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:#484f58}
.detail-nav a{color:#58a6ff;cursor:pointer;text-decoration:none}
.detail-nav a:hover{text-decoration:underline}
.detail-nav span{color:#30363d}
.detail-header{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px 16px;margin-bottom:16px}
.detail-key-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.detail-key{font-family:'SF Mono','Fira Code',monospace;font-size:14px;color:#58a6ff;word-break:break-all;flex:1}
.detail-copy-btn{background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .1s}
.detail-copy-btn:hover{color:#c9d1d9;border-color:#484f58}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:2px 8px;font-size:11px;color:#8b949e}
.tag-encoding{color:#7ee787;border-color:#238636}
.tag-size{color:#d2a8ff;border-color:#6e40c9}
.tag-warn{color:#d29922;border-color:#9e6a03}
.detail-actions{display:flex;gap:8px;margin-top:10px}
.detail-btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;text-decoration:none;font-weight:500;transition:all .1s}
.detail-btn:hover{background:#30363d;border-color:#484f58}
.detail-btn-primary{background:#1f6feb;color:#fff;border-color:#1f6feb}
.detail-btn-primary:hover{background:#388bfd}
.detail-body{background:#161b22;border:1px solid #21262d;border-radius:8px;overflow:hidden}
.detail-body-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #21262d;background:#0d1117}
.detail-body-toolbar span{font-size:11px;color:#484f58;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.detail-body-content{padding:16px;overflow-x:auto;max-height:calc(100vh - 320px);overflow-y:auto}

/* Viewers */
.json-viewer{font-size:13px;font-family:'SF Mono','Fira Code',monospace;line-height:1.6}
.json-key{color:#79c0ff}.json-str{color:#a5d6ff}.json-num{color:#d2a8ff}.json-bool{color:#ff7b72}.json-null{color:#484f58}
.json-toggle{cursor:pointer;user-select:none;color:#484f58;display:inline-block;width:14px;text-align:center}.json-toggle:hover{color:#c9d1d9}
.json-collapsed{display:none}
.json-summary{color:#484f58;font-style:italic}
.text-viewer{font-family:'SF Mono','Fira Code',monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;color:#c9d1d9;line-height:1.6}
.hex-viewer{font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.7;color:#8b949e}
.hex-offset{color:#484f58}.hex-byte{color:#79c0ff}.hex-ascii{color:#7ee787}

/* Welcome */
.welcome{text-align:center;padding:80px 20px;max-width:500px;margin:0 auto}
.welcome h2{color:#c9d1d9;font-size:18px;margin-bottom:8px;font-weight:600}
.welcome p{color:#484f58;font-size:13px;margin-bottom:20px;line-height:1.6}
.welcome-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.welcome-btn{background:#161b22;color:#58a6ff;border:1px solid #21262d;border-radius:6px;padding:6px 16px;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.welcome-btn:hover{background:#1f2937;border-color:#30363d}

/* Status */
.loading{text-align:center;padding:40px;color:#8b949e}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:#484f58}
.error-banner{background:#1a0e14;border:1px solid #f8514933;color:#f85149;padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px}
.error-dismiss{background:none;border:none;color:#f85149;cursor:pointer;margin-left:auto;font-size:14px;padding:0 4px}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="app-header">
    <h1>Pebble UI</h1>
    <span class="subtitle">Key Browser</span>
    <div class="header-right">
      <span class="kbd-hint"><kbd>Ctrl</kbd>+<kbd>K</kbd> search &middot; <kbd>Esc</kbd> back</span>
    </div>
  </header>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = '{{BASE_PATH}}/api';

// --- State ---
let currentView = 'browser';
let keys = [];
let nextCursor = null;
let currentPrefix = '';
let activeChip = '';
let loading = false;
let errorMsg = '';
let detailData = null;
let keyTypes = [];
let selectedRow = -1;
let hasSearched = false;

// --- Toast ---
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard');
  });
}

// --- API ---
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.text();
    throw new Error(body || res.statusText);
  }
  return res.json();
}

function apiListKeys(prefix, cursor, limit) {
  limit = limit || 50;
  const p = new URLSearchParams({limit: String(limit)});
  if (prefix) p.set('prefix', prefix);
  if (cursor) p.set('cursor', cursor);
  return apiFetch(BASE + '/keys?' + p);
}

function apiGetKey(key) {
  return apiFetch(BASE + '/key?' + new URLSearchParams({key}));
}

function apiDownloadURL(key) {
  return BASE + '/key/download?' + new URLSearchParams({key});
}

async function loadKeyTypes() {
  try {
    const res = await apiFetch(BASE + '/key-types');
    keyTypes = res.key_types || [];
  } catch(e) {
    keyTypes = [];
  }
}

// --- Search ---
async function doSearch(query, append) {
  loading = true;
  errorMsg = '';
  hasSearched = true;
  if (!append) { keys = []; nextCursor = null; selectedRow = -1; }
  render();

  try {
    if (query && !append) {
      try {
        const data = await apiGetKey(query);
        if (data && data.value !== undefined) {
          detailData = data;
          currentView = 'detail';
          loading = false;
          render();
          return;
        }
      } catch(e) { /* fall through to prefix scan */ }
    }

    const c = append ? nextCursor : undefined;
    const res = await apiListKeys(query, c);
    keys = append ? keys.concat(res.keys) : res.keys;
    nextCursor = res.next_cursor || null;
    currentPrefix = query;
    activeChip = query;
  } catch(e) {
    errorMsg = e.message || 'Search failed';
  }
  loading = false;
  render();
}

async function selectKey(key) {
  try {
    const data = await apiGetKey(key);
    detailData = data;
    currentView = 'detail';
    render();
  } catch(e) {
    errorMsg = e.message || 'Failed to load key';
    render();
  }
}

function goBack() {
  currentView = 'browser';
  detailData = null;
  render();
}

function clearSearch() {
  currentPrefix = '';
  activeChip = '';
  keys = [];
  nextCursor = null;
  hasSearched = false;
  errorMsg = '';
  selectedRow = -1;
  render();
  var inp = document.getElementById('searchInput');
  if (inp) inp.focus();
}

// --- Key display helpers ---
function splitKey(key) {
  // Find the prefix part (first segment + separator)
  var sep = key.indexOf('/');
  if (sep === -1) sep = key.indexOf(':');
  if (sep === -1) return { prefix: '', suffix: key };
  // Find common prefix with current search
  if (currentPrefix && key.startsWith(currentPrefix)) {
    return { prefix: currentPrefix, suffix: key.slice(currentPrefix.length) };
  }
  return { prefix: key.slice(0, sep + 1), suffix: key.slice(sep + 1) };
}

// --- Rendering ---
function render() {
  const main = document.getElementById('main');
  if (currentView === 'detail' && detailData) {
    main.innerHTML = renderDetail(detailData);
    bindDetailEvents();
  } else {
    main.innerHTML = renderBrowser();
    bindBrowserEvents();
  }
}

function renderBrowser() {
  let html = '';

  // Search
  html += '<form class="search-bar" id="searchForm">';
  html += '<input type="text" id="searchInput" placeholder="Search by key prefix or exact key..." value="' + esc(currentPrefix) + '">';
  html += '<button type="button" class="search-clear" id="searchClear" style="' + (currentPrefix ? 'display:block' : 'display:none') + '">&times;</button>';
  html += '<button type="submit">Search</button></form>';

  // Filters
  if (keyTypes.length > 0) {
    html += '<div class="key-type-filter"><span class="filter-label">Filters</span><div class="filter-chips">';
    keyTypes.forEach(function(kt, i) {
      var isActive = activeChip === kt.prefix;
      html += '<div class="chip-wrapper" data-idx="' + i + '">';
      html += '<button class="chip' + (isActive ? ' chip-active' : '') + '" data-prefix="' + esc(kt.prefix) + '">' + esc(kt.label) + '</button>';
      html += '<div class="chip-tooltip" style="display:none">';
      html += '<div class="chip-desc">' + esc(kt.description) + '</div>';
      html += '<code class="chip-example">' + esc(kt.example) + '</code></div></div>';
    });
    html += '</div></div>';
  }

  // Error
  if (errorMsg) {
    html += '<div class="error-banner">' + esc(errorMsg);
    html += '<button class="error-dismiss" id="errorDismiss">&times;</button></div>';
  }

  // Loading
  if (loading) {
    html += '<div class="loading"><span class="loading-spinner"></span>Scanning keys...</div>';
    return html;
  }

  // Welcome state
  if (!hasSearched && keys.length === 0) {
    html += '<div class="welcome">';
    html += '<h2>Browse your Pebble store</h2>';
    html += '<p>Search by key prefix, click a quick filter, or browse all keys to get started.</p>';
    html += '<div class="welcome-actions">';
    html += '<button class="welcome-btn" id="browseAll">Browse all keys</button>';
    html += '</div></div>';
    return html;
  }

  // Empty
  if (keys.length === 0) {
    html += '<div class="empty">No keys found for <code>' + esc(currentPrefix) + '</code></div>';
    return html;
  }

  // Status bar
  html += '<div class="status-bar">';
  html += '<span class="status-count">' + keys.length + (nextCursor ? '+' : '') + ' keys</span>';
  if (currentPrefix) html += '<span>matching <span class="status-prefix">' + esc(currentPrefix) + '*</span></span>';
  html += '</div>';

  // Table
  html += '<div class="key-list"><table><thead><tr>';
  html += '<th class="th-num">#</th><th class="th-key">Key</th><th class="th-size">Size</th><th class="th-preview">Preview</th><th class="th-actions"></th>';
  html += '</tr></thead><tbody>';
  keys.forEach(function(entry, i) {
    var parts = splitKey(entry.key);
    var sel = i === selectedRow ? ' selected' : '';
    html += '<tr class="key-row' + sel + '" data-key="' + esc(entry.key) + '" data-idx="' + i + '">';
    html += '<td class="row-num">' + (i + 1) + '</td>';
    html += '<td class="key-cell" title="' + esc(entry.key) + '"><span class="key-prefix">' + esc(parts.prefix) + '</span><span class="key-suffix">' + esc(parts.suffix) + '</span></td>';
    html += '<td class="size-cell">' + formatSize(entry.value_size) + '</td>';
    html += '<td class="preview-cell" title="' + esc(entry.value_preview) + '">' + esc(entry.value_preview) + '</td>';
    html += '<td><button class="copy-btn" data-copy="' + esc(entry.key) + '" title="Copy key">&#x2398;</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  if (nextCursor) {
    html += '<button class="load-more" id="loadMore">Load more keys</button>';
  }
  html += '</div>';
  return html;
}

function renderDetail(data) {
  let html = '';

  // Breadcrumb
  html += '<div class="detail-nav">';
  html += '<a id="navHome">Pebble UI</a><span>/</span>';
  var keyParts = data.key.split(/[/:]/);
  if (keyParts.length > 1) {
    html += '<a id="navPrefix">' + esc(keyParts[0]) + '</a><span>/</span>';
  }
  html += '<span style="color:#8b949e">' + esc(keyParts[keyParts.length - 1] || data.key) + '</span>';
  html += '</div>';

  // Header card
  html += '<div class="detail-header"><div class="detail-key-row">';
  html += '<span class="detail-key">' + esc(data.key) + '</span>';
  html += '<button class="detail-copy-btn" id="copyKey">Copy key</button>';
  html += '</div>';
  html += '<div class="detail-tags">';
  html += '<span class="tag tag-encoding">' + esc(data.encoding) + '</span>';
  html += '<span class="tag tag-size">' + formatSize(data.size) + '</span>';
  if (data.truncated) html += '<span class="tag tag-warn">truncated</span>';
  html += '</div>';
  html += '<div class="detail-actions">';
  html += '<button class="detail-btn" id="backBtn">Back</button>';
  if (data.encoding === 'json') html += '<button class="detail-btn" id="copyValue">Copy JSON</button>';
  else html += '<button class="detail-btn" id="copyValue">Copy value</button>';
  if (data.size > 0) html += '<a href="' + apiDownloadURL(data.key) + '" class="detail-btn detail-btn-primary" download>Download raw</a>';
  html += '</div></div>';

  // Body
  html += '<div class="detail-body">';
  html += '<div class="detail-body-toolbar"><span>' + esc(data.encoding) + ' viewer</span></div>';
  html += '<div class="detail-body-content">';

  if (data.encoding === 'json') {
    html += '<div class="json-viewer">' + renderJSON(data.value, 0) + '</div>';
  } else if (data.encoding === 'base64') {
    html += '<pre class="hex-viewer">' + renderHex(data.value) + '</pre>';
  } else {
    html += '<pre class="text-viewer">' + esc(String(data.value)) + '</pre>';
  }

  html += '</div></div>';
  return html;
}

// --- JSON tree ---
function renderJSON(val, depth) {
  if (val === null) return '<span class="json-null">null</span>';
  if (typeof val === 'boolean') return '<span class="json-bool">' + val + '</span>';
  if (typeof val === 'number') return '<span class="json-num">' + val + '</span>';
  if (typeof val === 'string') return '<span class="json-str">"' + esc(val) + '"</span>';

  if (Array.isArray(val)) {
    if (val.length === 0) return '<span>[]</span>';
    var id = 'j' + (++jid);
    var col = depth >= 2;
    var h = '<span class="json-toggle" data-target="' + id + '">' + (col ? '\u25b6' : '\u25bc') + '</span>[';
    h += '<span class="json-summary" id="' + id + '-s"' + (col ? '' : ' style="display:none"') + '>' + val.length + ' items]</span>';
    h += '<div id="' + id + '"' + (col ? ' class="json-collapsed"' : '') + ' style="margin-left:18px">';
    for (var i = 0; i < val.length; i++) {
      h += '<div>' + renderJSON(val[i], depth + 1) + (i < val.length - 1 ? ',' : '') + '</div>';
    }
    h += '</div>]';
    return h;
  }

  if (typeof val === 'object') {
    var ks = Object.keys(val);
    if (ks.length === 0) return '<span>{}</span>';
    var id = 'j' + (++jid);
    var col = depth >= 2;
    var h = '<span class="json-toggle" data-target="' + id + '">' + (col ? '\u25b6' : '\u25bc') + '</span>{';
    h += '<span class="json-summary" id="' + id + '-s"' + (col ? '' : ' style="display:none"') + '>' + ks.length + ' keys}</span>';
    h += '<div id="' + id + '"' + (col ? ' class="json-collapsed"' : '') + ' style="margin-left:18px">';
    for (var i = 0; i < ks.length; i++) {
      h += '<div><span class="json-key">"' + esc(ks[i]) + '"</span>: ' + renderJSON(val[ks[i]], depth + 1) + (i < ks.length - 1 ? ',' : '') + '</div>';
    }
    h += '</div>}';
    return h;
  }
  return esc(String(val));
}
var jid = 0;

// --- Hex viewer ---
function renderHex(b64) {
  try {
    var raw = atob(b64);
    var bytes = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    var lines = [];
    for (var i = 0; i < bytes.length; i += 16) {
      var slice = bytes.slice(i, i + 16);
      var hex = Array.from(slice).map(function(b) { return '<span class="hex-byte">' + b.toString(16).padStart(2, '0') + '</span>'; }).join(' ');
      var ascii = '<span class="hex-ascii">' + Array.from(slice).map(function(b) { return (b >= 32 && b < 127) ? esc(String.fromCharCode(b)) : '.'; }).join('') + '</span>';
      lines.push('<span class="hex-offset">' + i.toString(16).padStart(8, '0') + '</span>  ' + hex.padEnd(48) + '  ' + ascii);
    }
    return lines.join('\n');
  } catch(e) {
    return esc(b64);
  }
}

// --- Events: Browser ---
function bindBrowserEvents() {
  var form = document.getElementById('searchForm');
  if (form) form.onsubmit = function(e) {
    e.preventDefault();
    doSearch(document.getElementById('searchInput').value.trim(), false);
  };

  var clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.onclick = clearSearch;

  var browseAll = document.getElementById('browseAll');
  if (browseAll) browseAll.onclick = function() { doSearch('', false); };

  var errDismiss = document.getElementById('errorDismiss');
  if (errDismiss) errDismiss.onclick = function() { errorMsg = ''; render(); };

  document.querySelectorAll('.chip').forEach(function(btn) {
    btn.onclick = function() {
      var prefix = btn.dataset.prefix;
      document.getElementById('searchInput').value = prefix;
      doSearch(prefix, false);
    };
  });

  document.querySelectorAll('.chip-wrapper').forEach(function(wrap) {
    var tip = wrap.querySelector('.chip-tooltip');
    if (!tip) return;
    wrap.onmouseenter = function() { tip.style.display = 'block'; };
    wrap.onmouseleave = function() { tip.style.display = 'none'; };
  });

  document.querySelectorAll('.key-row').forEach(function(row) {
    row.onclick = function(e) {
      if (e.target.classList.contains('copy-btn')) return;
      selectKey(row.dataset.key);
    };
  });

  document.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.onclick = function(e) {
      e.stopPropagation();
      copyText(btn.dataset.copy);
    };
  });

  var loadMore = document.getElementById('loadMore');
  if (loadMore) loadMore.onclick = function() { doSearch(currentPrefix, true); };

  // Focus search
  var inp = document.getElementById('searchInput');
  if (inp && !hasSearched) inp.focus();
}

// --- Events: Detail ---
function bindDetailEvents() {
  var backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.onclick = goBack;

  var navHome = document.getElementById('navHome');
  if (navHome) navHome.onclick = function() { clearSearch(); };

  var navPrefix = document.getElementById('navPrefix');
  if (navPrefix) navPrefix.onclick = function() {
    var prefix = detailData.key.split(/[/:]/)[0];
    var sep = detailData.key[prefix.length] || '/';
    goBack();
    doSearch(prefix + sep, false);
  };

  var copyKey = document.getElementById('copyKey');
  if (copyKey) copyKey.onclick = function() { copyText(detailData.key); };

  var copyValue = document.getElementById('copyValue');
  if (copyValue) copyValue.onclick = function() {
    var v = detailData.value;
    copyText(typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v));
  };

  // JSON toggles
  document.querySelectorAll('.json-toggle').forEach(function(toggle) {
    toggle.onclick = function() {
      var target = document.getElementById(toggle.dataset.target);
      var summary = document.getElementById(toggle.dataset.target + '-s');
      if (!target) return;
      var hidden = target.classList.contains('json-collapsed');
      if (hidden) {
        target.classList.remove('json-collapsed');
        target.style.display = '';
        if (summary) summary.style.display = 'none';
        toggle.textContent = '\u25bc';
      } else {
        target.classList.add('json-collapsed');
        target.style.display = 'none';
        if (summary) summary.style.display = '';
        toggle.textContent = '\u25b6';
      }
    };
  });
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', function(e) {
  // Ctrl+K or Cmd+K — focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    if (currentView === 'detail') goBack();
    var inp = document.getElementById('searchInput');
    if (inp) { inp.focus(); inp.select(); }
    return;
  }

  // Esc — back or clear
  if (e.key === 'Escape') {
    if (currentView === 'detail') { goBack(); return; }
    var inp = document.getElementById('searchInput');
    if (inp && document.activeElement === inp && currentPrefix) {
      clearSearch();
    }
    return;
  }

  // Arrow keys in browser view for row navigation
  if (currentView === 'browser' && keys.length > 0) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedRow = Math.min(selectedRow + 1, keys.length - 1);
      render();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedRow = Math.max(selectedRow - 1, 0);
      render();
    } else if (e.key === 'Enter' && selectedRow >= 0 && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      selectKey(keys[selectedRow].key);
    }
  }
});

// --- Helpers ---
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function esc(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

// --- Init ---
loadKeyTypes().then(render);
</script>
